version: '3.8'

services:
  db:
    image: postgres:15
    container_name: atomquest-db
    environment:
      POSTGRES_USER: atomquest
      POSTGRES_PASSWORD: atomquest
      POSTGRES_DB: atomquest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
